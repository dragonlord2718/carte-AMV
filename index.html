<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réseau Tactique du DuMeltenVarden</title>
    <style>
        body { background-color: #0b0f19; color: #00ffcc; text-align: center; font-family: 'Courier New', monospace; padding: 20px; }
        h1 { text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; }
        .status { color: #ff3333; font-weight: bold; animation: blink 1.5s infinite; margin-bottom: 25px; }
        .map-container { max-width: 800px; margin: 0 auto; border: 3px solid #00ffcc; box-shadow: 0 0 25px rgba(0,255,204,0.4); border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 500px; border: none; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <h1>🛰️ AMV - SYSTÈME DE CARTOGRAPHIE MILITAIRE</h1>
    <p class="status">⚠️ ALERTE : INVASION DE L'ONYXAT EN COURS AU SUD-OUEST ⚠️</p>
    
    <div class="map-container">
        <!-- Cette ligne va afficher une superbe carte technologique interactive directement -->
        <iframe src="https://google.com"></iframe>
    </div>
</body>
</html>
